version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: |
            python -m pip install --upgrade pip
            pip install flask

  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: |
            pip install flask
      - run:
          name: Start Flask App
          command: |
            python app.py &
            sleep 5
      - run:
          name: Test Health Endpoint
          command: |
            curl http://localhost:5000/health

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker Image
          command: |
            docker build -t flask-devops-app .
      - run:
          name: Deploy Container
          command: |
            docker run -d -p 5000:5000 flask-devops-app

workflows:
  version: 2
  flask_pipeline:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test