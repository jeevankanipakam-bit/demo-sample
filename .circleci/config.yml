version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.9
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install flask

      - run:
          name: Build Docker Image
          command: |
            docker build -t my-flask-app .

  test:
    docker:
      - image: cimg/python:3.9
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install flask

      - run:
          name: Test Application
          command: |
            python -m py_compile app.py

  deploy:
    machine: true
    steps:
      - checkout

      - run:
          name: Deploy Application
          command: |
            echo "Deploying Flask App..."
            docker build -t my-flask-app .
            docker run -d -p 6000:6000 my-flask-app

workflows:
  version: 2
  ci_pipeline:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test